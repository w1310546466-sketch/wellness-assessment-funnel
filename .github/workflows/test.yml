name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_DATA_MODE: memory
      DATABASE_URL: postgresql://user:password@localhost:5432/ruiqi?schema=public
      DIRECT_URL: postgresql://user:password@localhost:5432/ruiqi?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
      - run: npm run build
